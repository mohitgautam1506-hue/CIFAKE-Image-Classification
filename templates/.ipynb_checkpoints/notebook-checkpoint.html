<!DOCTYPE html>
<html>
<head>
    <title>Training Graphs</title>

    <style>
        body{
            font-family: Arial;
            background:#f5f5f5;
            text-align:center;
            padding:20px;
        }

        h1{
            color:#333;
        }

        .graph-box{
            background:white;
            padding:20px;
            margin:20px auto;
            width:80%;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        img{
            width:90%;
            border-radius:10px;
        }

        .btn{
            background:#007bff;
            color:white;
            padding:10px 20px;
            text-decoration:none;
            border-radius:5px;
        }

        .btn:hover{
            background:#0056b3;
        }

    </style>

</head>

<body>

<h1>Model Training Performance</h1>

<div class="graph-box">
    <h2>Accuracy Graph</h2>
    <img src="/static/accuracy.png">
</div>

<div class="graph-box">
    <h2>Loss Graph</h2>
    <img src="/static/loss.png">
</div>

<div class="graph-box">
    <h2>Precision Graph</h2>
    <img src="/static/precision.png">
</div>

<div class="graph-box">
    <h2>Recall Graph</h2>
    <img src="/static/recall.png">
</div>

<div class="graph-box">
    <h2>F1 Score Graph</h2>
    <img src="/static/f1score.png">
</div>

<br>

<a href="/Predict" class="btn">Back to Prediction Page</a>

</body>
</html>
